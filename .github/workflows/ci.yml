name: CI

on:
  push:
    branches: [main, leadparrot-mvp]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify environment (Local Mock profile)
        run: npm run verify:env

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests (with coverage gate)
        run: npm run test:coverage

      - name: Build (mock AI, demo mode — no secrets needed)
        run: npm run build
        env:
          LEADPARROT_DEMO: "1"

  e2e:
    name: e2e (Playwright, demo mode)
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run e2e (LEADPARROT_DEMO=1, offline mock data)
        run: npm run test:e2e
        env:
          LEADPARROT_DEMO: "1"
