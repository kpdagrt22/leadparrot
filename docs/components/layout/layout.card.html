<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1" />

<body>
<div id="root"></div>
<script type="text/babel">
const { Card, Stat, Bento, BentoItem, Eyebrow } = window.CrestDesignSystemLeadParrot_bb3a07;

function Demo() {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "20px" }}>
      <Bento cols={4}>
        <BentoItem>
          <Stat label="Total leads" value="248" trend={{ dir: "up", value: "12" }} hint="this week" />
        </BentoItem>
        <BentoItem>
          <Stat label="High-intent" value="41" hint="score ≥ 70" />
        </BentoItem>
        <BentoItem tone="ink">
          <Stat label="Avg score" value="63" />

        <BentoItem tone="accent">
          <Stat label="Replies copied" value="29" />

      </Bento>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "16px" }}>

          <Eyebrow>Default</Eyebrow>
          <p style={{ margin: "10px 0 0", fontSize: "13px", color: "var(--ink-2)" }}>Warm surface, 1px structural border, zero shadow.</p>

        <Card variant="outline" interactive pad="md">
