<!-- @dsCard group="Brand" viewport="700x180" name="The Crest Mark" subtitle="A geometric chevron crest — the peak of intent. Two lockups" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px; display: flex; align-items: center; gap: 44px; }
  .lockup { display: flex; align-items: center; gap: 14px; }
  .mark { width: 44px; height: 44px; }
  .word { font-family: var(--font-display); font-weight: 400; font-size: 28px; letter-spacing: -0.01em; color: var(--ink); }
  .word b { font-weight: 500; }
  .tm { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-4); margin-left: 4px; }
  .divider { width: 1px; height: 56px; background: var(--line-2); }
</style></head>
<body>
  <div class="lockup">
    <img class="mark" src="../assets/crest-mark.svg" alt="Crest mark" />
    <span class="word"><b>Lead</b>Parrot</span>
  </div>
  <div class="divider"></div>
  <div class="lockup">
    <img class="mark" src="../assets/crest-mark-outline.svg" alt="Crest mark outline" />
    <span class="word">Crest <span class="tm">DS</span></span>
  </div>
</body></html>
