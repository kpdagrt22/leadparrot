<!-- @dsCard group="Colors" viewport="700x150" name="Ink — Text Scale" subtitle="Warm near-black; four steps, never pure #000" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .sw { border: 1px solid var(--line-2); }
  .chip { height: 76px; display: flex; align-items: flex-end; padding: 8px; }
  .chip span { font-family: var(--font-display); font-size: 26px; }
  .meta { padding: 9px 11px; font-family: var(--font-mono); font-size: 11px; color: var(--ink-2); display: flex; flex-direction: column; gap: 3px; }
  .meta b { font-weight: 500; color: var(--ink); }
  .meta em { color: var(--ink-4); font-style: normal; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink)"><span style="color:var(--paper)">Ag</span></div><div class="meta"><b>--ink</b><em>#1C1B17 · body</em></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-2)"><span style="color:var(--paper)">Ag</span></div><div class="meta"><b>--ink-2</b><em>#4A463C · secondary</em></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-3)"><span style="color:var(--paper)">Ag</span></div><div class="meta"><b>--ink-3</b><em>#6F6A5C · muted</em></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-4)"><span style="color:var(--paper)">Ag</span></div><div class="meta"><b>--ink-4</b><em>#9A9483 · faint</em></div></div>
  </div>
</body></html>
