<!-- @dsCard group="Spacing" viewport="700x150" name="Radii — Sharp or Pill" subtitle="Strict rule: 0px corners everywhere, full pill for badges only" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; }
  .row { display: flex; align-items: center; gap: 28px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 84px; height: 64px; background: var(--surface); border: 1px solid var(--line-strong); }
  .tok { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-2); letter-spacing: 0.04em; text-align: center; }
  .tok em { color: var(--ink-4); font-style: normal; display: block; }
  .pill { width: 84px; height: 30px; border-radius: 999px; background: var(--accent-tint); border: 1px solid var(--accent-line); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); }
</style></head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="border-radius:0"></div><div class="tok">--radius-none<em>0px · cards, buttons, inputs</em></div></div>
    <div class="col"><div class="box" style="border-radius:2px"></div><div class="tok">--radius-xs<em>2px · inputs, chips only</em></div></div>
    <div class="col"><div class="pill">Badge</div><div class="tok">--radius-pill<em>999px · badges, avatars, toggles</em></div></div>
  </div>
</body></html>
