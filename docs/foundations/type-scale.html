<!-- @dsCard group="Type" viewport="700x320" name="Type Scale" subtitle="From 84px editorial hero down to 11px mono micro-label" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 26px; }
  .ladder { display: flex; flex-direction: column; gap: 14px; }
  .step { display: flex; align-items: baseline; gap: 18px; border-bottom: 1px solid var(--line); padding-bottom: 12px; }
  .step:last-child { border-bottom: none; }
  .spec { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-4); width: 130px; flex: 0 0 130px; }
  .ex { font-family: var(--font-display); font-weight: 300; color: var(--ink); letter-spacing: -0.02em; line-height: 1; }
  .ex.sans { font-family: var(--font-sans); font-weight: 400; letter-spacing: 0; }
</style></head>
<body>
  <div class="ladder">
    <div class="step"><span class="spec">5xl · 84 · display</span><span class="ex" style="font-size:60px">Crest</span></div>
    <div class="step"><span class="spec">3xl · 48 · display</span><span class="ex" style="font-size:44px">High-intent leads</span></div>
    <div class="step"><span class="spec">2xl · 36 · display</span><span class="ex" style="font-size:34px">From conversation to reply</span></div>
    <div class="step"><span class="spec">lg · 22 · display</span><span class="ex" style="font-size:22px">Reply draft</span></div>
    <div class="step"><span class="spec">base · 16 · sans</span><span class="ex sans" style="font-size:16px">Body copy that stays legible and calm.</span></div>
    <div class="step"><span class="spec">xs · 13 · sans</span><span class="ex sans" style="font-size:13px;color:var(--ink-2)">Secondary UI and captions.</span></div>
  </div>
</body></html>
