<!-- @dsCard group="Type" viewport="700x180" name="Pairing — Eyebrow + Headline" subtitle="The Crest rhythm: mono kicker over a serif headline" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px; }
  .eyebrow { display: inline-flex; align-items: center; gap: 10px; font-family: var(--font-mono); font-size: 12px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }
  .eyebrow::before { content: ""; width: 18px; height: 1px; background: currentColor; opacity: 0.6; }
  h2 { font-family: var(--font-display); font-weight: 300; font-size: 38px; line-height: 1.08; letter-spacing: -0.02em; color: var(--ink); margin: 14px 0 0; }
  p { font-family: var(--font-sans); font-size: 15px; line-height: 1.55; color: var(--ink-2); margin: 12px 0 0; max-width: 520px; }
</style></head>
<body>
  <span class="eyebrow">How it works</span>
  <h2>Your next customers are already asking — in public.</h2>
  <p>Score the opportunity, then draft a transparent reply you review and post yourself.</p>
</body></html>
