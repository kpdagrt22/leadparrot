<!-- @dsCard group="Spacing" viewport="700x150" name="Space Scale" subtitle="4px base unit; generous editorial whitespace" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; }
  .row { display: flex; align-items: flex-end; gap: 16px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--accent); width: 22px; }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); letter-spacing: 0.04em; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--ink); }
</style></head>
<body>
  <div class="row">
    <div class="col"><div class="bar" style="height:4px"></div><div class="px">4</div><div class="tok">1</div></div>
    <div class="col"><div class="bar" style="height:8px"></div><div class="px">8</div><div class="tok">2</div></div>
    <div class="col"><div class="bar" style="height:12px"></div><div class="px">12</div><div class="tok">3</div></div>
    <div class="col"><div class="bar" style="height:16px"></div><div class="px">16</div><div class="tok">4</div></div>
    <div class="col"><div class="bar" style="height:24px"></div><div class="px">24</div><div class="tok">5</div></div>
    <div class="col"><div class="bar" style="height:32px"></div><div class="px">32</div><div class="tok">6</div></div>
    <div class="col"><div class="bar" style="height:48px"></div><div class="px">48</div><div class="tok">7</div></div>
    <div class="col"><div class="bar" style="height:64px"></div><div class="px">64</div><div class="tok">8</div></div>
    <div class="col"><div class="bar" style="height:96px"></div><div class="px">96</div><div class="tok">9</div></div>
  </div>
</body></html>
