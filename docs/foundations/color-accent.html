<!-- @dsCard group="Colors" viewport="700x150" name="Accent — Verdigris" subtitle="The one owned color: a refined botanical green" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .sw { border: 1px solid var(--line-2); }
  .chip { height: 76px; }
  .meta { padding: 9px 11px; font-family: var(--font-mono); font-size: 11px; display: flex; flex-direction: column; gap: 3px; }
  .meta b { font-weight: 500; color: var(--ink); }
  .meta em { color: var(--ink-4); font-style: normal; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--accent)"></div><div class="meta"><b>--accent</b><em>#2E5E45 · primary</em></div></div>
    <div class="sw"><div class="chip" style="background:var(--accent-press)"></div><div class="meta"><b>--accent-press</b><em>#244B37 · pressed</em></div></div>
    <div class="sw"><div class="chip" style="background:var(--accent-soft)"></div><div class="meta"><b>--accent-soft</b><em>#5A7C66 · sage / bars</em></div></div>
    <div class="sw"><div class="chip" style="background:var(--accent-tint)"></div><div class="meta"><b>--accent-tint</b><em>#E6EBE3 · wash</em></div></div>
  </div>
</body></html>
