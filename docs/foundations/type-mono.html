<!-- @dsCard group="Type" viewport="700x180" name="Mono — IBM Plex Mono" subtitle="Data, metadata, labels & buttons. Uppercase + tracked" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 26px; font-family: var(--font-mono); }
  .label { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }
  .btn { display: inline-block; margin-top: 10px; padding: 10px 18px; border: 1px solid var(--accent); background: var(--accent); color: var(--paper); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
  .data { margin-top: 18px; font-size: 13px; color: var(--ink); letter-spacing: 0.02em; font-variant-numeric: tabular-nums; display: flex; gap: 24px; }
  .data b { color: var(--accent); font-weight: 500; }
  .meta { margin-top: 16px; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-4); }
</style></head>
<body>
  <div class="label">Relevance · 35%&nbsp;&nbsp;&nbsp;Intent · 30%&nbsp;&nbsp;&nbsp;Urgency · 20%&nbsp;&nbsp;&nbsp;Fit · 15%</div>
  <div class="btn">Generate reply</div>
  <div class="data"><span>SCORE <b>81</b></span><span>POSTED 2D AGO</span><span>r/freelance</span><span>CONF 62%</span></div>
  <div class="meta">IBM Plex Mono · 400 / 500 / 600 · --font-mono</div>
</body></html>
